<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Login to your personal Todo app and manage your tasks efficiently."/>
  <title>Login — TodoApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="auth-container">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">✅</div>
      <h1 class="brand-name">TodoApp</h1>
      <p class="brand-tagline">Stay on top of your tasks</p>
    </div>

    <!-- Login Card -->
    <div class="card auth-card">
      <h2 class="card-title">Welcome back</h2>
      <p class="card-subtitle">Sign in to your account</p>

      <!-- Error / Success message box -->
      <div id="auth-message" class="message-box hidden"></div>

      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="login-email">Email address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              id="login-email"
              type="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              id="login-password"
              type="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pwd" onclick="togglePassword('login-password', this)" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <!-- Submit -->
        <button id="login-btn" type="submit" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="/register">Create one →</a>
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn     = document.getElementById("login-btn");
      const msg     = document.getElementById("auth-message");
      const email   = document.getElementById("login-email").value.trim();
      const password= document.getElementById("login-password").value;

      setLoading(btn, true);
      clearMessage(msg);

      try {
        const res  = await fetch("/auth/login", {
          method : "POST",
          headers: { "Content-Type": "application/json" },
          body   : JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.success) {
          showMessage(msg, `👋 Welcome back, ${data.name}! Redirecting…`, "success");
          setTimeout(() => window.location.href = "/dashboard", 1000);
        } else {
          showMessage(msg, data.message, "error");
        }
      } catch {
        showMessage(msg, "Network error. Please try again.", "error");
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
