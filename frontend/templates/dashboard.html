<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Manage your todos, set deadlines, and get reminded on WhatsApp."/>
  <title>Dashboard — TodoApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="dashboard-page">

  <!-- ── Top Navigation ── -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">✅</span>
      <span class="nav-title">TodoApp</span>
    </div>
    <div class="nav-right">
      <span class="nav-user">👋 {{ user.name }}</span>
      <a href="/auth/logout" class="btn btn-ghost btn-sm" id="logout-btn">Logout</a>
    </div>
  </nav>

  <!-- ── Main Layout ── -->
  <main class="dashboard-main">

    <!-- ── Stats Bar ── -->
    <section class="stats-bar">
      <div class="stat-card" id="stat-total">
        <div class="stat-number" id="count-total">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card" id="stat-pending">
        <div class="stat-number" id="count-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card" id="stat-done">
        <div class="stat-number" id="count-done">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card" id="stat-overdue">
        <div class="stat-number" id="count-overdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </section>

    <!-- ── Add Todo Panel ── -->
    <section class="add-panel card">
      <h2 class="section-title">➕ Add New Task</h2>
      <div id="add-message" class="message-box hidden"></div>
      <form id="add-todo-form" class="add-form" novalidate>
        <div class="form-row">
          <!-- Title -->
          <div class="form-group flex-2">
            <label for="todo-title">Task Title *</label>
            <div class="input-wrapper">
              <span class="input-icon">📝</span>
              <input id="todo-title" type="text" placeholder="What do you need to do?" required/>
            </div>
          </div>
          <!-- Priority -->
          <div class="form-group flex-1">
            <label for="todo-priority">Priority</label>
            <div class="input-wrapper">
              <span class="input-icon">🎯</span>
              <select id="todo-priority">
                <option value="High">🔴 High</option>
                <option value="Medium" selected>🟡 Medium</option>
                <option value="Low">🟢 Low</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <!-- Description -->
          <div class="form-group flex-2">
            <label for="todo-desc">Description</label>
            <div class="input-wrapper">
              <span class="input-icon">💬</span>
              <input id="todo-desc" type="text" placeholder="Optional details…"/>
            </div>
          </div>
          <!-- Due Date -->
          <div class="form-group flex-1">
            <label for="todo-due">Due Date & Time</label>
            <div class="input-wrapper">
              <span class="input-icon">📅</span>
              <input id="todo-due" type="datetime-local"/>
            </div>
          </div>
        </div>

        <button id="add-btn" type="submit" class="btn btn-primary">
          <span class="btn-text">Add Task</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>
    </section>

    <!-- ── Filter Tabs ── -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" id="tab-all">All</button>
      <button class="filter-tab" data-filter="pending" id="tab-pending">Pending</button>
      <button class="filter-tab" data-filter="done" id="tab-done">Completed</button>
      <button class="filter-tab" data-filter="overdue" id="tab-overdue">Overdue ⚠️</button>
    </div>

    <!-- ── Todo List ── -->
    <section class="todo-list" id="todo-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <p>No tasks yet. Add one above!</p>
      </div>
    </section>

  </main>

  <!-- ── Toast Notification ── -->
  <div id="toast" class="toast hidden"></div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
